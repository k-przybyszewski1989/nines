version: "3.9"

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: nines
      MARIADB_USER: nines
      MARIADB_PASSWORD: nines
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nginx-test.rule=Host(`nines.ilord.pl`)"
      - "traefik.http.routers.nginx-test.entrypoints=websecure"
      - "traefik.http.routers.nginx-test.tls=true"
      - "traefik.http.services.nginx-test.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik"

volumes:
  db_data:

networks:
  traefik:
    external: true
